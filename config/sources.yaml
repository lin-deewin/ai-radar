# AI Radar 数据源配置
# authority: 0.0~1.0 源权威权重
# tags: 主题分类，用于过滤 ai / hardware
# lang: 语言，用于摘要/分组

# ===== 采集调度 =====
schedule:
  arxiv_interval_minutes: 60
  rss_interval_minutes: 15
  lookback_hours: 72          # 默认回溯窗口（覆盖周末）

# ===== 评分权重 =====
ranking:
  authority: 0.35
  recency: 0.25
  engagement: 0.20
  novelty: 0.20
  recency_half_life_hours: 72

# ===== arXiv =====
arxiv:
  categories:
    - cs.AI
    - cs.LG
    - cs.CL
    - cs.AR        # Hardware Architecture -> tag=hardware
    - cs.PF        # Performance -> tag=hardware
    - cs.DC        # Distributed Computing -> tag=hardware
  max_results: 200
  authority: 0.9
  lang: en        # tag 按类别动态判定，见 collectors/arxiv.py

# ===== Hugging Face Daily Papers =====
hf_papers:
  url: "https://huggingface.co/api/daily_papers"
  authority: 0.95
  tags: ["ai"]
  lang: en

# ===== RSS / 博客 / 社区 =====
rss_sources:
